name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deploy scope
        required: true
        default: auto
        type: choice
        options:
          - auto
          - all
          - web
          - server

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  detect:
    name: Detect deploy scope
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.scope.outputs.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deploy scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          MANUAL_TARGET: ${{ inputs.deploy_target || 'auto' }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$MANUAL_TARGET" != "auto" ]; then
            echo "target=$MANUAL_TARGET" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${BEFORE_SHA:-}" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "target=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")
          echo "$changed_files"

          if echo "$changed_files" | grep -Eq '^(\.github/workflows/deploy\.yml|docker-compose\.yml|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|packages/types/|nginx/|mysql/)'; then
            echo "target=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          web_changed=false
          server_changed=false

          if echo "$changed_files" | grep -Eq '^(apps/web/)'; then
            web_changed=true
          fi

          if echo "$changed_files" | grep -Eq '^(apps/server/)'; then
            server_changed=true
          fi

          if [ "$web_changed" = true ] && [ "$server_changed" = true ]; then
            echo "target=all" >> "$GITHUB_OUTPUT"
          elif [ "$web_changed" = true ]; then
            echo "target=web" >> "$GITHUB_OUTPUT"
          elif [ "$server_changed" = true ]; then
            echo "target=server" >> "$GITHUB_OUTPUT"
          else
            echo "target=none" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ needs.detect.outputs.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect
    if: needs.detect.outputs.target != 'none'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack release
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude='**/node_modules' \
            --exclude='**/dist' \
            --exclude=.env \
            --exclude=apps/server/.env \
            --exclude=.DS_Store \
            -czf chenxu-space-deploy.tgz \
            .

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          scp -P "$SSH_PORT" -i ~/.ssh/deploy_key chenxu-space-deploy.tgz "$SSH_USER@$SSH_HOST:/tmp/chenxu-space-deploy.tgz"

      - name: Activate release
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_TARGET: ${{ needs.detect.outputs.target }}
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "DEPLOY_TARGET=$DEPLOY_TARGET bash -s" <<'REMOTE'
          set -euo pipefail

          APP_DIR=/opt/chenxu-space
          BACKUP_DIR=/root/deploy-backups
          RELEASE_ARCHIVE=/tmp/chenxu-space-deploy.tgz
          TS=$(date +%Y%m%d-%H%M%S)

          if [ ! -f "$APP_DIR/.env" ]; then
            echo "Missing $APP_DIR/.env; refusing to deploy without production environment variables." >&2
            exit 1
          fi

          mkdir -p "$BACKUP_DIR"
          cp "$APP_DIR/.env" /tmp/chenxu-space.env
          if [ -d "$APP_DIR/nginx/ssl" ]; then
            rm -rf /tmp/chenxu-space-ssl
            cp -a "$APP_DIR/nginx/ssl" /tmp/chenxu-space-ssl
          fi

          mv "$APP_DIR" "$BACKUP_DIR/chenxu-space-$TS"
          mkdir -p "$APP_DIR"
          tar -xzf "$RELEASE_ARCHIVE" -C "$APP_DIR"
          cp /tmp/chenxu-space.env "$APP_DIR/.env"
          if [ -d /tmp/chenxu-space-ssl ]; then
            mkdir -p "$APP_DIR/nginx"
            cp -a /tmp/chenxu-space-ssl "$APP_DIR/nginx/ssl"
          fi

          cd "$APP_DIR"
          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          else
            COMPOSE="docker-compose"
          fi

          case "$DEPLOY_TARGET" in
            web)
              $COMPOSE up -d --build web
              $COMPOSE up -d --force-recreate nginx
              ;;
            server)
              $COMPOSE up -d --build server
              $COMPOSE up -d --force-recreate nginx
              ;;
            all)
              $COMPOSE up -d --build
              $COMPOSE up -d --force-recreate nginx
              ;;
            *)
              echo "Unsupported DEPLOY_TARGET=$DEPLOY_TARGET" >&2
              exit 1
              ;;
          esac

          $COMPOSE ps
          REMOTE

      - name: Health check
        run: |
          curl --fail --show-error --silent --max-time 20 https://chenxu.xyz/api/health

  skip:
    name: Skip deploy
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.target == 'none'
    steps:
      - name: No deployment needed
        run: echo "No frontend, backend, or deployment files changed."
